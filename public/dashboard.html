<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELITE – HR Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 48px 40px; width: 380px; text-align: center; }
    .login-box .logo { font-size: 28px; font-weight: 700; color: #c9a227; letter-spacing: 4px; margin-bottom: 6px; }
    .login-box .subtitle { font-size: 13px; color: #8b949e; margin-bottom: 32px; }
    .login-box input { width: 100%; padding: 12px 16px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; margin-bottom: 16px; outline: none; }
    .login-box input:focus { border-color: #c9a227; }
    .btn-primary { width: 100%; padding: 12px; background: #c9a227; color: #0d1117; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
    .btn-primary:hover { background: #e0b82d; }
    .error-msg { color: #f85149; font-size: 13px; margin-top: 12px; display: none; }

    #dashboard { display: none; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header-left .brand { font-size: 20px; font-weight: 700; color: #c9a227; letter-spacing: 3px; }
    .header-left .tagline { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .stats-bar { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat .num { font-size: 22px; font-weight: 700; color: #c9a227; }
    .stat .lbl { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
    .btn-logout { padding: 8px 16px; background: transparent; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 13px; cursor: pointer; }
    .btn-logout:hover { border-color: #f85149; color: #f85149; }

    main { padding: 32px; }
    .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select { padding: 9px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 13px; outline: none; }
    .filters input:focus, .filters select:focus { border-color: #c9a227; }
    .filters input { width: 260px; }
    .filter-label { font-size: 13px; color: #8b949e; }

    .table-wrap { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #1c2128; }
    th { padding: 14px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; font-weight: 600; border-bottom: 1px solid #30363d; }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid #21262d; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }

    .cefr-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    .cefr-C2 { background: #1a472a; color: #56d364; }
    .cefr-C1 { background: #1b3a5e; color: #58a6ff; }
    .cefr-B2 { background: #3b2d0e; color: #e3b341; }
    .cefr-B1 { background: #3d1a00; color: #f0883e; }
    .cefr-A2 { background: #3d1515; color: #f85149; }
    .cefr-A1 { background: #2d1515; color: #da3633; }

    .score-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #21262d; color: #e6edf3; }
    .btn-view { padding: 6px 14px; background: #c9a227; color: #0d1117; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-view:hover { background: #e0b82d; }
    .btn-delete { padding: 6px 10px; background: transparent; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 12px; cursor: pointer; margin-left: 6px; }
    .btn-delete:hover { border-color: #f85149; color: #f85149; }
    .empty-state { text-align: center; padding: 64px; color: #8b949e; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-start; justify-content: center; padding: 32px 16px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 100%; max-width: 780px; padding: 32px; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer; }
    .modal-close:hover { color: #e6edf3; }
    .modal h2 { font-size: 20px; color: #c9a227; margin-bottom: 4px; }
    .modal .meta { font-size: 13px; color: #8b949e; margin-bottom: 24px; }

    .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .score-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px; text-align: center; }
    .score-card .val { font-size: 22px; font-weight: 700; color: #c9a227; }
    .score-card .dim { font-size: 11px; color: #8b949e; margin-top: 4px; }

    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; margin: 20px 0 10px; border-bottom: 1px solid #21262d; padding-bottom: 6px; }
    .behavior-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .behavior-item { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 12px; }
    .behavior-item .b-label { font-size: 11px; color: #8b949e; }
    .behavior-item .b-val { font-size: 13px; font-weight: 600; margin-top: 3px; }
    .b-val.good { color: #56d364; } .b-val.warn { color: #e3b341; } .b-val.bad { color: #f85149; }

    .report-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 20px; font-size: 13px; line-height: 1.75; white-space: pre-wrap; font-family: 'Courier New', monospace; max-height: 400px; overflow-y: auto; color: #c9d1d9; }
    .loading { text-align: center; padding: 48px; color: #8b949e; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="logo">ELITE</div>
    <div class="subtitle">HR · C,L&D Admin Portal</div>
    <input type="password" id="adminKeyInput" placeholder="Enter Admin Key" />
    <button class="btn-primary" onclick="doLogin()">ACCESS DASHBOARD</button>
    <div class="error-msg" id="loginError">Invalid admin key. Please try again.</div>
  </div>
</div>

<div id="dashboard">
  <header>
    <div class="header-left">
      <div class="brand">ELITE</div>
      <div class="tagline">English Language &amp; Interpersonal Talent Evaluator — HR Admin</div>
    </div>
    <div class="header-right">
      <div class="stats-bar">
        <div class="stat"><div class="num" id="statTotal">—</div><div class="lbl">Total</div></div>
        <div class="stat"><div class="num" id="statAvg">—</div><div class="lbl">Avg Score</div></div>
        <div class="stat"><div class="num" id="statTop">—</div><div class="lbl">Top CEFR</div></div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </header>
  <main>
    <div class="filters">
      <span class="filter-label">Filter:</span>
      <input type="text" id="searchInput" placeholder="Search name, email, role…" oninput="renderTable()" />
      <select id="cefrFilter" onchange="renderTable()">
        <option value="">All CEFR Levels</option>
        <option>C2</option><option>C1</option><option>B2</option>
        <option>B1</option><option>A2</option><option>A1</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Candidate</th><th>Role</th><th>Date</th><th>Score</th><th>CEFR</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7"><div class="loading">Loading assessments…</div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"><div class="loading">Loading…</div></div>
  </div>
</div>

<script>
  let adminKey = '';
  let allData = [];

  function doLogin() {
    const key = document.getElementById('adminKeyInput').value.trim();
    if (!key) return;
    adminKey = key;
    fetchAssessments();
  }

  document.getElementById('adminKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    adminKey = ''; allData = [];
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('adminKeyInput').value = '';
  }

  async function fetchAssessments() {
    try {
      const res = await fetch('/admin/assessments', { headers: { 'x-admin-key': adminKey } });
      if (res.status === 401) {
        document.getElementById('loginError').style.display = 'block';
        adminKey = ''; return;
      }
      const data = await res.json();
      allData = data.assessments || [];
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      updateStats(); renderTable();
    } catch (err) {
      document.getElementById('loginError').textContent = 'Could not connect to server.';
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allData.length;
    if (allData.length > 0) {
      const avg = allData.reduce((s, r) => s + (r.overallScore || 0), 0) / allData.length;
      document.getElementById('statAvg').textContent = Math.round(avg);
      const counts = {};
      allData.forEach(r => { counts[r.cefrLevel] = (counts[r.cefrLevel] || 0) + 1; });
      const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
      document.getElementById('statTop').textContent = top ? top[0] : '—';
    }
  }

  function renderTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cf = document.getElementById('cefrFilter').value;
    let rows = allData.filter(r => {
      const matchQ = !q || (r.name||'').toLowerCase().includes(q) || (r.email||'').toLowerCase().includes(q) || (r.role||'').toLowerCase().includes(q);
      return matchQ && (!cf || r.cefrLevel === cf);
    });
    const tbody = document.getElementById('tableBody');
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div>No assessments found.</div></div></td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td style="color:#8b949e">${i+1}</td>
        <td><div style="font-weight:600">${r.name}</div><div style="font-size:12px;color:#8b949e">${r.email}</div></td>
        <td style="color:#8b949e;font-size:12px">${r.role||'—'}</td>
        <td style="color:#8b949e;font-size:12px">${r.assessmentDate||'—'}</td>
        <td><span class="score-pill">${r.overallScore??'—'} / 100</span></td>
        <td><span class="cefr-badge cefr-${r.cefrLevel}">${r.cefrLevel||'—'}</span></td>
        <td>
          <button class="btn-view" onclick="viewReport('${r.id}')">View Report</button>
          <button class="btn-delete" onclick="deleteRecord('${r.id}','${r.name}')">🗑</button>
        </td>
      </tr>`).join('');
  }

  async function viewReport(id) {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalBody').innerHTML = '<div class="loading">Loading full report…</div>';
    try {
      const res = await fetch(`/admin/assessments/${id}`, { headers: { 'x-admin-key': adminKey } });
      const r = await res.json();
      const bObs = r.behavioralObservations || {};
      function rateClass(v) {
        if (['Low','Minimal','Strong','Smooth','Stable','Positive'].includes(v)) return 'good';
        if (['High','Excessive','Weak','Poor','Significant Drop','Negative'].includes(v)) return 'bad';
        return 'warn';
      }
      const s = r.scores || {};
      document.getElementById('modalBody').innerHTML = `
        <h2>${r.candidate?.name}</h2>
        <div class="meta">${r.candidate?.email} · ${r.candidate?.role||'N/A'} · ${r.candidate?.experience||'?'} yrs · ${r.assessmentDate}</div>
        <div class="score-grid">
          <div class="score-card"><div class="val">${r.overallScore??'—'}<span style="font-size:14px;color:#8b949e">/100</span></div><div class="dim">Overall</div></div>
          <div class="score-card"><div class="val"><span class="cefr-badge cefr-${r.cefrLevel}">${r.cefrLevel}</span></div><div class="dim">CEFR</div></div>
          <div class="score-card"><div class="val">${s.grammar??'—'}<span style="font-size:14px;color:#8b949e">/20</span></div><div class="dim">Grammar</div></div>
          <div class="score-card"><div class="val">${s.vocabulary??'—'}<span style="font-size:14px;color:#8b949e">/15</span></div><div class="dim">Vocabulary</div></div>
          <div class="score-card"><div class="val">${s.fluency??'—'}<span style="font-size:14px;color:#8b949e">/20</span></div><div class="dim">Fluency</div></div>
          <div class="score-card"><div class="val">${s.pronunciation??'—'}<span style="font-size:14px;color:#8b949e">/15</span></div><div class="dim">Pronunciation</div></div>
          <div class="score-card"><div class="val">${s.coherence??'—'}<span style="font-size:14px;color:#8b949e">/10</span></div><div class="dim">Coherence</div></div>
          <div class="score-card"><div class="val">${s.workplaceCommunication??'—'}<span style="font-size:14px;color:#8b949e">/10</span></div><div class="dim">Workplace</div></div>
          <div class="score-card"><div class="val">${s.confidence??'—'}<span style="font-size:14px;color:#8b949e">/10</span></div><div class="dim">Confidence</div></div>
        </div>
        ${Object.keys(bObs).length ? `
          <div class="section-title">Behavioral Observations</div>
          <div class="behavior-grid">${Object.entries(bObs).map(([k,v])=>`
            <div class="behavior-item">
              <div class="b-label">${k.replace(/([A-Z])/g,' $1').trim()}</div>
              <div class="b-val ${rateClass(v)}">${v}</div>
            </div>`).join('')}
          </div>` : ''}
        <div class="section-title">Full Assessment Report</div>
        <div class="report-box">${r.report||'No report available.'}</div>
        ${r.transcript ? `<div class="section-title" style="margin-top:20px">Transcript</div><div class="report-box" style="max-height:250px">${r.transcript}</div>` : ''}
      `;
    } catch { document.getElementById('modalBody').innerHTML = '<div class="loading">Failed to load.</div>'; }
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function closeModalOutside(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

  async function deleteRecord(id, name) {
    if (!confirm(`Delete assessment for "${name}"?`)) return;
    const res = await fetch(`/admin/assessments/${id}`, { method: 'DELETE', headers: { 'x-admin-key': adminKey } });
    if (res.ok) { allData = allData.filter(r => r.id !== id); updateStats(); renderTable(); }
  }
</script>
</body>
</html>
